# waypoints.yaml
# ---------------
# Default zone definitions for the 10 m x 10 m walled-room Gazebo world.
# NOTE: Positions below are FALLBACK defaults only.
# At runtime, pickup_site_node generates random positions and
# main_controller overwrites these coordinates via _apply_random_zone_positions().

pickup_zones:
  - id: "zone_1"
    name: "Zone 1"
    marker_id: 0
    object_name: "Red Box"
    position:
      x: 0.0
      y: 0.0
      theta: 0.0
    priority: 2

  - id: "zone_2"
    name: "Zone 2"
    marker_id: 1
    object_name: "Blue Cube"
    position:
      x: 0.0
      y: 0.0
      theta: 0.0
    priority: 1

  - id: "zone_3"
    name: "Zone 3"
    marker_id: 2
    object_name: "Green Cylinder"
    position:
      x: 0.0
      y: 0.0
      theta: 0.0
    priority: 3

dropoff_zone:
  name: "Home Base"
  position:
    x: 0.0
    y: 0.0
    theta: 0.0

navigation:
  goal_tolerance: 0.50
  max_retry_attempts: 3
